version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: praem_ops
      POSTGRES_USER: praem
      POSTGRES_PASSWORD: praem_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "3010:3010"
    environment:
      DATABASE_URL: postgresql://praem:praem_secret@postgres:5432/praem_ops
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_in_production
      JWT_REFRESH_SECRET: change_me_refresh_in_production
      PORT: 3010
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "8087:8087"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3010
      NEXT_PUBLIC_WS_URL: ws://localhost:3010
    depends_on:
      - api

volumes:
  postgres_data:
